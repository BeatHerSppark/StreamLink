spring.application.name=video-chat-backend-test

# H2 Test Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests
spring.flyway.enabled=false

# JWT
jwt.secret=test-secret-key-for-jwt-signing-only-not-for-production
jwt.expiration-ms=86400000
jwt.issuer=video-chat-backend-test

# LiveKit API
livekit.url=wss://test-project.livekit.cloud
livekit.api.key=test-livekit-api-key
livekit.api.secret=test-livekit-api-secret

# CORS
app.cors.allowed-origins=http://localhost:3000
