<div class="modal-overlay" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Create Room</h2>
      <button class="modal-close" (click)="close()">&times;</button>
    </div>
    <div class="modal-body">
      @if (error()) {
        <div class="form-error">{{ error() }}</div>
      }
      <div class="form-group">
        <label for="room-name">Room Name</label>
        <input id="room-name" type="text" [(ngModel)]="name" [maxlength]="AppConstants.MAX_ROOM_NAME_LENGTH" placeholder="e.g. Team Standup" />
      </div>
      <div class="form-group">
        <label for="room-desc">Description</label>
        <textarea id="room-desc" [(ngModel)]="description" [maxlength]="AppConstants.MAX_ROOM_DESCRIPTION_LENGTH" placeholder="What's this room about?"></textarea>
      </div>
      <div class="form-group">
        <label>Visibility</label>
        <div class="visibility-toggle">
          <button
            type="button"
            class="btn btn-sm"
            [class.btn-primary]="isPublic()"
            [class.btn-secondary]="!isPublic()"
            (click)="isPublic.set(true)">
            🌐 Public
          </button>
          <button
            type="button"
            class="btn btn-sm"
            [class.btn-primary]="!isPublic()"
            [class.btn-secondary]="isPublic()"
            (click)="isPublic.set(false)">
            🔒 Private
          </button>
        </div>
        <p class="form-hint">{{ isPublic() ? 'Anyone can discover and join this room from Explore.' : 'Only people with an invite link can join this room.' }}</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="close()">Cancel</button>
      <button class="btn btn-primary" [disabled]="isSubmitting()" (click)="submit()">
        {{ isSubmitting() ? 'Creating...' : 'Create Room' }}
      </button>
    </div>
  </div>
</div>
